<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AllGigabaytes</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f5f5;color:#000;text-align:center;}
.container{max-width:620px;margin:20px auto 40px;padding:0 10px;}
.titulo{font-weight:bold;color:#007bff;margin-bottom:10px;}
.equalizer{display:flex;justify-content:center;gap:8px;margin:12px 0 22px;}
.equalizer span{display:block;width:7px;height:40px;background:linear-gradient(to top,#00f0ff,#007bff);border-radius:3px;animation:pulse 1s ease-in-out infinite;}
.equalizer span:nth-child(1){animation-delay:0s;}
.equalizer span:nth-child(2){animation-delay:0.1s;}
.equalizer span:nth-child(3){animation-delay:0.2s;}
.equalizer span:nth-child(4){animation-delay:0.3s;}
.equalizer span:nth-child(5){animation-delay:0.4s;}
.equalizer span:nth-child(6){animation-delay:0.5s;}
.equalizer span:nth-child(7){animation-delay:0.6s;}
.equalizer span:nth-child(8){animation-delay:0.7s;}
@keyframes pulse{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}

.operadoras{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:20px;}
.btn-operadora{flex:1 1 42%;max-width:160px;padding:14px 0;font-size:17px;font-weight:700;color:#fff;border:none;border-radius:10px;cursor:pointer;box-shadow:0 4px 7px rgba(0,0,0,.2);}
.vodacom{background:#e60000;}
.movitel{background:#ff8c00;}
.mcel{background:#007bff;}
.streaming{background:#111;}
.ilimitados{background:#e60000;}

.pacotes{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:10px;position:relative;}
.cartao-pacote{background:#fff;border-radius:14px;padding:16px 14px 22px;box-shadow:0 3px 11px rgba(0,0,0,.17);display:flex;flex-direction:column;justify-content:space-between;min-height:135px;}
.cartao-pacote h4{margin:8px 0 10px;font-weight:800;font-size:16px;color:#000;}
.cartao-pacote p{font-size:14px;color:#555;margin:0 0 14px;}
.cartao-pacote .detalhe{color:#e60000;font-weight:600;}
.cartao-pacote button{margin-top:auto;color:#fff;border:none;padding:9px 0;border-radius:10px;cursor:pointer;font-weight:800;font-size:15px;}
.cartao-pacote.vodacom button{background:#e60000;}
.cartao-pacote.movitel button{background:#ff8c00;}
.cartao-pacote.mcel button{background:#007bff;}
.cartao-pacote.streaming button{background:#111;}
.logo-streaming{width:70px;height:auto;margin:0 auto 8px;user-select:none;}

.ilimitados-menu{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;}
.btn-ilimitados{width:85%;padding:14px 0;border:none;border-radius:12px;color:#fff;font-weight:800;cursor:pointer;box-shadow:0 4px 7px rgba(0,0,0,.2);font-size:16px;}

.voltar-top{display:none;background:#198754;color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;cursor:pointer;margin:10px 0;font-size:16px;border:none;}

#suporteWhatsApp{position:fixed;bottom:60px;right:10px;z-index:111;}
#suporteWhatsApp a{display:flex;align-items:center;text-decoration:none;}
#suporteWhatsApp img{width:60px;height:60px;}

#overlayBotao{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:25px;border-radius:20px;display:none;flex-direction:column;align-items:center;box-shadow:0 5px 20px rgba(0,0,0,.4);z-index:999;width:90%;max-width:400px;}
#btnAbrirFormulario{background:#198754;color:#fff;border:none;padding:12px 20px;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:10px;width:100%;}
.fechar{position:absolute;top:10px;right:10px;background:red;color:#fff;border:none;border-radius:50%;width:25px;height:25px;cursor:pointer;}

#numeroReceber{width:100%;padding:10px 12px;margin-top:12px;margin-bottom:6px;font-size:15px;border-radius:8px;border:1px solid #ccc;box-sizing:border-box;}
#erroNumero{color:red;font-size:14px;margin:6px 0;display:none;text-align:left;width:100%;}
.pacotes.dimmed .cartao-pacote{opacity:0.3;pointer-events:none;}
</style>
</head>
<body>
<div class="container">
  <div class="titulo">Melhor fornecedora de internet da atualidade</div>
  <div class="equalizer"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>

  <button class="voltar-top" id="voltarPacotes" onclick="voltarOperadoras()">Voltar às Operadoras</button>

  <h2 id="tituloOperadora">Selecione a Operadora</h2>

  <div class="operadoras" id="operadoras">
    <button class="btn-operadora vodacom" onclick="clicarOperadora('vodacom')">Vodacom</button>
    <button class="btn-operadora movitel" onclick="clicarOperadora('movitel')">Movitel</button>
    <button class="btn-operadora mcel" onclick="clicarOperadora('mcel')">Mcel</button>
    <button class="btn-operadora streaming" onclick="clicarOperadora('streaming')">Netflix / Spotify</button>
    <button class="btn-operadora ilimitados" onclick="clicarOperadora('ilimitados')">Pacotes Ilimitados</button>
  </div>

  <div class="pacotes" id="pacotes"></div>
</div>

<div id="suporteWhatsApp">
  <a href="https://wa.me/258842372840" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp"/>
  </a>
</div>

<div id="overlayBotao">
  <button class="fechar" onclick="fecharOverlay()">X</button>
  <h4 id="pacoteOverlayTexto"></h4>
  <input type="text" id="numeroReceber" placeholder="Número a receber"/>
  <div id="erroNumero">Por favor, insira um número válido com 9 dígitos.</div>
  <button id="btnAbrirFormulario">Preencher Formulário</button>
</div>

<script>
let pacoteSelecionado="";
let operadoraAtual="";
const cores={vodacom:'#e60000',movitel:'#ff8c00',mcel:'#007bff',streaming:'#111'};

const pacotesData={
 vodacom:['10GB - 110MT','20GB - 220MT','30GB - 330MT','40GB - 440MT','50GB - 550MT','60GB - 660MT','70GB - 770MT','80GB - 880MT','90GB - 990MT','100GB - 1000MT','120GB - 1200MT','130GB - 1300MT','140GB - 1400MT','150GB - 1500MT'],
 movitel:['10GB - 115MT','20GB - 225MT','30GB - 325MT','40GB - 444MT','50GB - 555MT','60GB - 665MT','70GB - 775MT','80GB - 885MT','90GB - 995MT','100GB - 1005MT','110GB - 1115MT','120GB - 1225MT','130GB - 1335MT','140GB - 1445MT','150GB - 1555MT','160GB - 1665MT'],
 mcel:['10GB - 110MT','20GB - 220MT','30GB - 315MT','40GB - 424MT'],
 streaming:[
   {name:'Netflix - 1 Mês - 225MT',logo:'https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg'},
   {name:'Spotify - 1 Mês - 160MT',logo:'https://upload.wikimedia.org/wikipedia/commons/2/26/Spotify_logo_with_text.svg'}
 ],
 ilimitados:{
   vodacom:['Chamadas + SMS ilimitados + 20GB - 380MT','Chamadas + SMS ilimitados + 40GB - 640MT'],
   movitel:['Chamadas + SMS ilimitados + 20GB - 380MT','Chamadas + SMS ilimitados + 40GB - 640MT'],
   mcel:['Chamadas + SMS ilimitados + 20GB - 380MT','Chamadas + SMS ilimitados + 40GB - 640MT']
 }
};

function clicarOperadora(tipo){
  operadoraAtual = tipo;
  document.getElementById('operadoras').style.display='none';
  document.getElementById('voltarPacotes').style.display='block';
  const pacotesDiv=document.getElementById('pacotes');
  pacotesDiv.innerHTML='';

  if(tipo==='streaming'){
    pacotesData.streaming.forEach(p=>{
      const card=document.createElement('div');
      card.className='cartao-pacote streaming';
      card.innerHTML=`<img src="${p.logo}" class="logo-streaming"/><h4>${p.name}</h4><p>Válido por 30 dias</p>`;
      const btn=document.createElement('button');
      btn.textContent='Comprar';
      btn.style.backgroundColor=cores.streaming;
      btn.onclick=()=>abrirOverlay(p.name, tipo);
      card.appendChild(btn);
      pacotesDiv.appendChild(card);
    });
  } else if(tipo==='ilimitados'){
    const wrap=document.createElement('div'); wrap.className='ilimitados-menu';
    ['vodacom','movitel','mcel'].forEach(op=>{
      const btn=document.createElement('button');
      btn.className='btn-ilimitados';
      btn.textContent='Ilimitados ' + op.charAt(0).toUpperCase() + op.slice(1);
      btn.style.backgroundColor=cores[op];
      btn.onclick=()=>clicarIlimitadosOperadora(op);
      wrap.appendChild(btn);
    });
    pacotesDiv.appendChild(wrap);
  } else{
    pacotesData[tipo].forEach(p=>{
      const card=document.createElement('div');
      card.className='cartao-pacote '+tipo;
      card.innerHTML=`<h4>${p}</h4><p>Válido por 30 dias</p>`;
      const btn=document.createElement('button');
      btn.textContent='Comprar';
      btn.style.backgroundColor=cores[tipo];
      btn.onclick=()=>abrirOverlay(p, tipo);
      card.appendChild(btn);
      pacotesDiv.appendChild(card);
    });
  }
}

function clicarIlimitadosOperadora(op){
  operadoraAtual = op;
  const pacotesDiv=document.getElementById('pacotes');
  pacotesDiv.innerHTML='';
  pacotesData.ilimitados[op].forEach(p=>{
    const card=document.createElement('div');
    card.className='cartao-pacote ilimitados';
    card.innerHTML=`<h4 class="detalhe">${p}</h4><p>Válido por 30 dias</p>`;
    const btn=document.createElement('button');
    btn.textContent='Comprar';
    btn.style.backgroundColor=cores[op];
    btn.onclick=()=>abrirOverlay(p, op);
    card.appendChild(btn);
    pacotesDiv.appendChild(card);
  });
}

function voltarOperadoras(){
  document.getElementById('operadoras').style.display='flex';
  document.getElementById('pacotes').innerHTML='';
  document.getElementById('voltarPacotes').style.display='none';
}

function abrirOverlay(pacote, operadora){
  pacoteSelecionado=pacote;
  operadoraAtual = operadora;
  const overlay = document.getElementById('overlayBotao');
  const inputNumero = document.getElementById('numeroReceber');
  const erroDiv = document.getElementById('erroNumero');
  document.getElementById('pacoteOverlayTexto').innerText=pacote;
  overlay.style.display='flex';
  document.getElementById('pacotes').classList.add('dimmed');

  if(operadora==='streaming'){
    inputNumero.style.display='none';
    erroDiv.style.display='none';
  } else {
    inputNumero.style.display='block';
    erroDiv.style.display='none';
    if(operadora==='vodacom'){ inputNumero.placeholder='Número Vodacom (84/85...)'; }
    else if(operadora==='movitel'){ inputNumero.placeholder='Número Movitel (86/87...)'; }
    else if(operadora==='mcel'){ inputNumero.placeholder='Número Mcel (82/83...)'; }
    inputNumero.value='';
  }
}

function fecharOverlay(){
  document.getElementById('overlayBotao').style.display='none';
  document.getElementById('pacotes').classList.remove('dimmed');
}

// ===== Validação 9 dígitos + prefixo =====
document.getElementById('btnAbrirFormulario').onclick = function() {
  const numero = document.getElementById('numeroReceber').value.trim();
  const erroDiv = document.getElementById('erroNumero');

  if(operadoraAtual !== 'streaming'){
    const regex = /^\d{9}$/;
    if(!regex.test(numero)){
      erroDiv.innerText = 'Por favor, insira um número com 9 dígitos.';
      erroDiv.style.display='block';
      return;
    }
    // Validação prefixo
    const prefix = numero.substring(0,2);
    if(operadoraAtual==='vodacom' && !(prefix==='84'||prefix==='85')){
      erroDiv.innerText = 'Número Vodacom deve começar com 84 ou 85.';
      erroDiv.style.display='block';
      return;
    }
    if(operadoraAtual==='movitel' && !(prefix==='86'||prefix==='87')){
      erroDiv.innerText = 'Número Movitel deve começar com 86 ou 87.';
      erroDiv.style.display='block';
      return;
    }
    if(operadoraAtual==='mcel' && !(prefix==='82'||prefix==='83')){
      erroDiv.innerText = 'Número Mcel deve começar com 82 ou 83.';
      erroDiv.style.display='block';
      return;
    }
  }

  erroDiv.style.display='none';

  if(pacoteSelecionado.includes("10GB - 115MT")){ window.location.href="https://ratixpay.site/checkout.html?produto=SDWJCT9R6"; return; }
  if(pacoteSelecionado.includes("10GB - 110MT")){ window.location.href="https://ratixpay.site/checkout.html?produto=579P1DG45"; return; }
  if(pacoteSelecionado.includes("20GB - 220MT")){ window.location.href="https://ratixpay.site/checkout.html?produto=70GTO925E"; return; }
  if(pacoteSelecionado.includes("225") || pacoteSelecionado.includes("225MT") || pacoteSelecionado.includes("Netflix")){ window.location.href="https://ratixpay.site/checkout.html?produto=0TR93S9PO"; return; }
  if(pacoteSelecionado.includes("380MT") || pacoteSelecionado.includes("ilimitado")){ window.location.href="https://ratixpay.site/checkout.html?produto=EEF1IFZLU"; return; }

  alert("Este pacote ainda não tem link de pagamento.");
};
</script>
</body>
</html>
